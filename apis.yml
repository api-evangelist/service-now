aid: service-now
name: ServiceNow (alias)
description: This repository is an alias for the canonical API Evangelist ServiceNow profile.
  The provider is published as `servicenow` at https://github.com/api-evangelist/servicenow,
  which holds the apis.yml index, OpenAPI specs, Naftiko capabilities, JSON Schema,
  JSON Structure, JSON-LD, examples, plans, rate-limits, FinOps, and Spectral rules
  for every documented ServiceNow REST API (Table, Aggregate, Attachment, Import Set,
  Batch, Scripted REST, Now Assist, and related surfaces). Use the canonical repo for
  all profiling artifacts and updates. ServiceNow's product domain uses the hyphenated
  `service-now.com` (the instance base URL) while the company brand and developer portal
  use `servicenow.com`; both resolve to the same provider profile.
